name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

permissions:
  contents: read

jobs:
  shellcheck:
    name: Lint shell scripts
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install shellcheck
        run: sudo apt-get install -y shellcheck

      - name: Run shellcheck on scripts
        run: |
          shellcheck scripts/setup-pi.sh
          shellcheck scripts/install-rocm.sh
          shellcheck scripts/build-llama.sh
          shellcheck scripts/verify-gpu.sh
          shellcheck configs/rocm-env.sh

  markdown-lint:
    name: Lint Markdown files
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install markdownlint
        run: npm install -g markdownlint-cli

      - name: Run markdownlint
        run: markdownlint '**/*.md' --ignore node_modules --ignore .git
        continue-on-error: true

  validate-structure:
    name: Validate repo structure
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Check required files exist
        run: |
          for f in README.md LICENSE CONTRIBUTING.md CODE_OF_CONDUCT.md .gitignore \
                   assets/ghostgpu-banner.svg \
                   configs/rocm-env.sh configs/llama-server.service \
                   docs/SETUP_GUIDE.md docs/ARCHITECTURE.md docs/PERFORMANCE.md docs/TROUBLESHOOTING.md \
                   scripts/setup-pi.sh scripts/install-rocm.sh scripts/build-llama.sh scripts/verify-gpu.sh \
                   .github/workflows/ci.yml \
                   .github/ISSUE_TEMPLATE/bug_report.md \
                   .github/ISSUE_TEMPLATE/feature_request.md \
                   .github/PULL_REQUEST_TEMPLATE.md; do
            if [ ! -f "$f" ]; then
              echo "MISSING: $f"
              exit 1
            else
              echo "OK: $f"
            fi
          done
